spring.application.name=mybatis_plus
# 主从数据源配置
spring.datasource.dynamic.primary=master
spring.datasource.dynamic.strict=false
# master 数据源
spring.datasource.dynamic.datasource.master.url=jdbc:mysql://localhost:3306/use_database
spring.datasource.dynamic.datasource.master.username=root
spring.datasource.dynamic.datasource.master.password=111222
spring.datasource.dynamic.datasource.master.driver-class-name=com.mysql.cj.jdbc.Driver

# slave_1 数据源+@DS();
spring.datasource.dynamic.datasource.slave_1.url=jdbc:mysql://localhost:3306/use_school
spring.datasource.dynamic.datasource.slave_1.username=root
spring.datasource.dynamic.datasource.slave_1.password=111222
spring.datasource.dynamic.datasource.slave_1.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/use_database
#spring.datasource.username=root
#spring.datasource.password=111222
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-aliases-package=CRUD.resource
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.global-config.db-config.id-type=assign_id
mybatis-plus.global-config.db-config.logic-delete-field=status
mybatis-plus.global-config.db-config.logic-not-delete-value=1
mybatis-plus.global-config.db-config.logic-delete-value=0
